server:
  port: 8087
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhiguang_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # --- 初始化与大小配置 ---
      initial-size: 5             # 初始连接数
      min-idle: 5                 # 最小空闲连接数
      max-active: 20              # 最大活跃连接数 (根据并发量调整)

      # --- 超时与回收配置 ---
      max-wait: 60000             # 获取连接时最大等待时间 (毫秒)
      time-between-eviction-runs-millis: 60000  # 检测空闲连接的间隔时间
      min-evictable-idle-time-millis: 300000    # 连接最小空闲生存时间
      max-evictable-idle-time-millis: 900000    # 连接最大空闲生存时间

      # --- 健康检查 (保持连接可用) ---
      validation-query: SELECT 1  # 用来检测连接是否有效的 SQL (MySQL 用 SELECT 1)
      test-while-idle: true       # 建议设为 true，空闲时检测，性能损耗小
      test-on-borrow: false       # 借出时检测，性能损耗大，高并发建议 false
      test-on-return: false       # 归还时检测，性能损耗大

      # --- 监控统计拦截器 (核心功能) ---
      filters: stat,wall,slf4j
      # stat: 监控统计
      # wall: 防火墙 (防 SQL 注入)
      # slf4j: 将 Druid 日志输出到 Slf4j (可选)
      # log4j/log4j2: 如果使用这些日志框架可替换

      # --- StatViewServlet 配置 (监控页面) ---
      stat-view-servlet:
        enabled: true             # 开启监控页面
        url-pattern: /druid/*     # 监控页面访问路径 (http://localhost:8080/druid/)
        reset-enable: false       # 禁止页面上的 "Reset All" 按钮 (生产环境建议关闭)
        login-username: admin     # 监控页面登录账号
        login-password: admin123  # 监控页面登录密码 (生产环境务必修改!)

      # --- WebStatFilter 配置 (监控 Web 请求) ---
      web-stat-filter:
        enabled: true
        url-pattern: /*           # 拦截所有请求
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" # 排除静态资源和监控页本身
  ai:
    zhipuai:
      api-key: 256b1fde5db742d4b2a5c19694fea3bf.Kiz7OM99lUC0UdP1
mybatis:
  mapper-locations: classpath:mapper/*.xml

oss:
